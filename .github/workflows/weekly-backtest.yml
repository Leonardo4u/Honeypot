name: Weekly Backtest

on:
  schedule:
    - cron: "30 9 * * 1"
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run moving-window backtest
        run: python scripts/backtest_moving_window.py

      - name: Evaluate promotion gate
        run: python scripts/check_promotion_gate.py

      - name: Build SLO panel snapshot
        run: python scripts/slo_panel.py
